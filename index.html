<!-- 톱니질문 트랙 — 홈(모드 선택) 진입점. 개인 모드는 app.html로, 실시간 모드는 공개수업 후(P2) -->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>톱니질문 트랙</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Jua&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <main class="home-wrap">
    <h1 class="home-title">⚙ 톱니질문 트랙</h1>
    <p class="home-sub">질문을 만들고 · 나누고 · 톱니로 잇는 도구</p>

    <div class="mode-grid">
      <a class="mode-card live" href="./app.html">
        <div class="mode-emoji">👤</div>
        <div class="mode-name">혼자 해 보기</div>
        <div class="mode-desc">내 질문을 만들고 톱니로 이어 봐요</div>
      </a>
      <div class="mode-card" id="card-room">
        <div class="mode-emoji">🧩</div>
        <div class="mode-name">방 들어가기</div>
        <div class="mode-desc">친구들과 함께 (실시간)</div>
        <form class="room-join" id="room-join">
          <input id="room-code" type="text" inputmode="latin" autocapitalize="characters"
                 autocomplete="off" maxlength="6" placeholder="수업 코드 6자" aria-label="수업 코드" />
          <button class="btn" type="submit">들어가기</button>
        </form>
      </div>
    </div>

    <div class="teacher-row">
      <button class="teacher-link" id="teacher-btn" type="button">🧑‍🏫 선생님 ▸ 새 활동(방) 만들기</button>
    </div>

    <div class="home-notice" id="notice" hidden></div>
  </main>

  <script>
    "use strict";
    // 홈 + 라우팅. 혼자 해 보기=app.html(오프라인). 방 들어가기=수업 코드→app.html?code=. 선생님(방 만들기)은 구글 로그인(B) 전이라 안내만.
    const notice = document.getElementById("notice");
    function showNotice(msg) { notice.hidden = false; notice.textContent = msg; }

    const codeInput = document.getElementById("room-code");
    codeInput.addEventListener("input", () => { codeInput.value = codeInput.value.toUpperCase(); });
    document.getElementById("room-join").addEventListener("submit", e => {
      e.preventDefault();
      const code = (codeInput.value || "").trim().toUpperCase();
      if (!/^[A-Z2-9]{6}$/.test(code)) {
        showNotice("수업 코드는 영문 대문자·숫자 6자예요. (예: ABCD23) 선생님께 코드를 확인해 주세요.");
        codeInput.focus(); return;
      }
      location.href = "./app.html?code=" + encodeURIComponent(code);
    });

    document.getElementById("teacher-btn").addEventListener("click", () =>
      showNotice("🔜 선생님 ‘방 만들기’(구글 로그인)는 곧 열려요. 지금은 학생이 ‘방 들어가기’에 수업 코드를 넣어 함께할 수 있어요."));
  </script>
</body>
</html>
