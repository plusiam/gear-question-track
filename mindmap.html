<!-- 톱니질문 마인드맵 — 한 장면에서 사실 → 추론 → 상상으로 가지 쳐 나가는 질문 지도(발산). 개인 전용·localStorage. 트랙(수렴)과 짝 -->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>질문 지도 · 톱니질문</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Jua&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <link rel="stylesheet" href="./css/style.css" />
  <style>
    /* 질문 지도(마인드맵) 전용 — 가지 트리 */
    .mm-sub { color: var(--muted); font-size: .9em; margin: 0 2px 14px; }
    #map-target { background: #fff; border: 1px solid var(--line); border-radius: var(--radius); padding: 16px; }
    .mm-scene { background: #f3f6ff; border: 1px dashed #b9c6ec; border-radius: 12px; padding: 12px 14px; margin-bottom: 14px; white-space: pre-wrap; color: #33405e;
      font-family: "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", system-ui, sans-serif; }
    .mm-scene:empty { display: none; }
    /* 노드 */
    .mm-node { margin: 8px 0; }
    .mm-row { display: flex; align-items: center; gap: 8px; }
    .mm-badge { font-size: .72em; font-weight: 800; color: #fff; border-radius: 999px; padding: 2px 9px; white-space: nowrap; }
    .mm-fact > .mm-row > .mm-badge { background: var(--fact); }
    .mm-infer > .mm-row > .mm-badge { background: var(--infer); }
    .mm-imagine > .mm-row > .mm-badge { background: var(--imagine); }
    .mm-text { flex: 1; font: inherit; border: 2px solid var(--line); border-radius: 10px; padding: 8px 11px; min-width: 80px;
      font-family: "Gaegu", "Apple SD Gothic Neo", "Noto Sans KR", system-ui, sans-serif; font-size: 1.05em; }
    .mm-fact > .mm-row > .mm-text { border-color: var(--fact); background: var(--fact-bg); }
    .mm-infer > .mm-row > .mm-text { border-color: var(--infer); background: var(--infer-bg); }
    .mm-imagine > .mm-row > .mm-text { border-color: var(--imagine); background: var(--imagine-bg); }
    .mm-text:focus-visible { outline: 3px solid #111; outline-offset: 1px; }
    .mm-btn { font: inherit; cursor: pointer; border: 1px solid var(--line); background: #fff; border-radius: 999px; padding: 5px 10px; font-weight: 700; font-size: .82em; white-space: nowrap; }
    .mm-add-infer { color: var(--infer); border-color: var(--infer); }
    .mm-add-imagine { color: var(--imagine); border-color: var(--imagine); }
    .mm-del { color: var(--muted); border: none; background: transparent; cursor: pointer; font-size: 1.05em; padding: 2px 6px; }
    /* 자식 들여쓰기 + 가지선 */
    .mm-children { margin-left: 18px; padding-left: 16px; border-left: 3px solid var(--line); }
    #add-fact { font: inherit; cursor: pointer; border: 2px solid var(--fact); background: var(--fact-bg); color: var(--fact); border-radius: 12px; padding: 10px 16px; font-weight: 800; margin-top: 10px; }
    .mm-empty { color: #aeb6c5; font-size: .9em; padding: 8px 2px; }
    @media print {
      body * { visibility: hidden !important; }
      #map-target, #map-target * { visibility: visible !important; }
      #map-target { position: absolute; left: 0; top: 0; width: 100%; border: none; }
      .mm-btn, .mm-del, #add-fact { display: none !important; }
    }
  </style>
</head>
<body>
  <a href="./index.html" class="home-link">← 홈</a>

  <header class="scene-bar">
    <div class="row">
      <label for="f-title">책 제목</label>
      <input id="f-title" type="text" placeholder="예: 연우의 도전 (어떤 책·글이든 적어요)" />
      <button class="btn ghost" id="btn-png" type="button">🖼 이미지로 저장</button>
      <button class="btn ghost" id="btn-print" type="button">🖨 인쇄</button>
      <button class="btn ghost" id="btn-reset" type="button">↺ 전부 비우기</button>
    </div>
    <div class="row">
      <label for="f-scene">장면</label>
      <textarea id="f-scene" placeholder="질문을 만들 장면이나 글을 적어요."></textarea>
    </div>
  </header>

  <p class="mm-sub">한 장면에서 <b>사실 → 추론 → 상상</b>으로 질문을 가지 쳐 나가요. 한 사실에 추론을 여러 개, 한 추론에 상상을 여러 개 붙일 수 있어요.</p>

  <div id="map-target">
    <div class="mm-scene" id="scene-show"></div>
    <div id="tree"></div>
    <button id="add-fact" type="button">＋ 사실 질문</button>
  </div>

  <div class="toast" id="toast" role="status"></div>

  <script>
    "use strict";
    // 질문 지도 — 노드 트리(scene → fact → infer → imagine). 단일 진실원천 + localStorage. 텍스트는 textContent/value로만 다뤄 주입 방지
    const LS = "gqt:mindmap:v1";
    const KO = { fact: "사실", infer: "추론", imagine: "상상" };
    const CHILD = { fact: "infer", infer: "imagine" };   // 다음 단계(상상은 잎)
    function fresh() { return { version: 1, title: "", scene: "", nodes: [], seq: 0 }; }
    let M = fresh();

    function load() { try { const o = JSON.parse(localStorage.getItem(LS)); if (o && o.version === 1 && Array.isArray(o.nodes)) return o; } catch (e) {} return null; }
    function save() { try { localStorage.setItem(LS, JSON.stringify(M)); } catch (e) {} }

    const $ = id => document.getElementById(id);
    let toastTimer = null;
    function toast(m) { const t = $("toast"); t.textContent = m; t.classList.add("show"); clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove("show"), 1500); }

    // ===== mutator =====
    function addNode(type, parent) {
      const node = { id: "m" + (++M.seq), type, text: "", parent: parent || null };
      M.nodes.push(node); save(); render();
      const el = document.querySelector('.mm-text[data-id="' + node.id + '"]'); if (el) el.focus();
    }
    function setText(id, text) { const n = M.nodes.find(x => x.id === id); if (n) { n.text = text; save(); } }
    function deleteNode(id) {
      // 자손까지 함께 삭제
      const kill = new Set([id]); let grew = true;
      while (grew) { grew = false; M.nodes.forEach(n => { if (n.parent && kill.has(n.parent) && !kill.has(n.id)) { kill.add(n.id); grew = true; } }); }
      M.nodes = M.nodes.filter(n => !kill.has(n.id)); save(); render();
    }

    // ===== 렌더 =====
    function makeNode(node) {
      const wrap = document.createElement("div"); wrap.className = "mm-node mm-" + node.type;
      const row = document.createElement("div"); row.className = "mm-row";
      const badge = document.createElement("span"); badge.className = "mm-badge"; badge.textContent = KO[node.type];
      const input = document.createElement("input"); input.type = "text"; input.className = "mm-text"; input.dataset.id = node.id;
      input.value = node.text; input.placeholder = KO[node.type] + " 질문을 적어요";
      input.setAttribute("aria-label", KO[node.type] + " 질문");
      input.addEventListener("input", e => setText(node.id, e.target.value));
      row.append(badge, input);
      if (CHILD[node.type]) {
        const add = document.createElement("button"); add.type = "button"; add.className = "mm-btn mm-add-" + CHILD[node.type];
        add.textContent = "＋ " + KO[CHILD[node.type]];
        add.addEventListener("click", () => addNode(CHILD[node.type], node.id));
        row.append(add);
      }
      const del = document.createElement("button"); del.type = "button"; del.className = "mm-del"; del.textContent = "✕";
      del.setAttribute("aria-label", "이 가지 지우기");
      del.addEventListener("click", () => { if (M.nodes.some(n => n.parent === node.id) ? confirm("이 질문과 아래 가지를 모두 지울까요?") : true) deleteNode(node.id); });
      row.append(del);
      wrap.append(row);
      const kids = M.nodes.filter(n => n.parent === node.id);
      if (kids.length) { const c = document.createElement("div"); c.className = "mm-children"; kids.forEach(k => c.appendChild(makeNode(k))); wrap.append(c); }
      return wrap;
    }
    function render() {
      $("scene-show").textContent = M.scene || "";
      const tree = $("tree"); tree.textContent = "";
      const facts = M.nodes.filter(n => n.type === "fact");
      if (!facts.length) { const e = document.createElement("div"); e.className = "mm-empty"; e.textContent = "아직 질문이 없어요. ‘＋ 사실 질문’으로 시작해요."; tree.appendChild(e); }
      else facts.forEach(f => tree.appendChild(makeNode(f)));
    }
    function syncInputs() { $("f-title").value = M.title || ""; $("f-scene").value = M.scene || ""; }

    // ===== 입력 바인딩 =====
    $("f-title").addEventListener("input", e => { M.title = e.target.value; save(); });
    $("f-scene").addEventListener("input", e => { M.scene = e.target.value; $("scene-show").textContent = e.target.value; save(); });
    $("add-fact").addEventListener("click", () => addNode("fact", null));
    $("btn-reset").addEventListener("click", () => { if (confirm("질문 지도를 모두 지우고 새로 시작할까요?")) { M = fresh(); save(); syncInputs(); render(); toast("새로 시작해요."); } });
    $("btn-print").addEventListener("click", () => window.print());
    $("btn-png").addEventListener("click", async () => {
      if (typeof html2canvas === "undefined") { toast("이미지 저장을 쓸 수 없어요. 인쇄를 이용해요."); return; }
      try {
        await document.fonts.ready;
        const canvas = await html2canvas($("map-target"), { scale: 2, backgroundColor: "#ffffff" });
        const a = document.createElement("a"); a.download = (M.title || "질문지도") + ".png"; a.href = canvas.toDataURL("image/png"); a.click();
        toast("이미지로 저장했어요.");
      } catch (e) { toast("이미지 저장에 실패했어요. 인쇄를 이용해요."); }
    });

    // ===== 시작 =====
    const saved = load();
    if (saved) M = saved;
    syncInputs(); render();
    if (document.fonts && document.fonts.load) { document.fonts.load('400 16px "Gaegu"'); document.fonts.load('400 16px "Jua"'); }

    // 테스트 훅
    window.MM = { get M() { return M; }, addNode, setText, deleteNode, render };
  </script>
</body>
</html>
